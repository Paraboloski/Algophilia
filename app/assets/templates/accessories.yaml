- key: ""
  name: "Anima del Pedone"
  weight: 0
  description: "Anima corrotta dall'Abisso, intrisa di potere. La povera creatura,
    come tutti i reietti delle profondità, era nata e cresciuta nell'oscurità
    donata dal Dio degli Abissi. Tuttavia, ella rifiutò tale dono, desiderando
    ardentemente di spiccare il volo avvolta dalla luce del sole. Inutile dire
    che ogni suo sforzo fu vano. La tua velocità di camminata è raddoppiata e il
    moltiplicatore della tua velocità di corsa diventa x3."
  can_be_removed: 0

- key: ""
  name: "Anima del Cavallo"
  weight: 0
  description: "Anima corrotta dall'Abisso, intrisa di potere. Il suo nitrire e scalciare, in preda alle
    ferite e al dolore, raggiunsero orecchie sorde. Fu l'Abisso stesso ad
    accogliere le sue richieste d'aiuto e a donarle una nuova vita."
  can_be_removed: 0

- key: ""
  name: "Anima dell'Alfiere"
  weight: 0
  description: "Anima corrotta dall'Abisso, intrisa di potere. Il capitano Rudimer
    era determinato a purificare il dungeon dalla corruzione. Non immaginava
    minimamente che sarebbe diventato egli stesso parte delle tenebre. Puoi
    impugnare armi a due mani con una sola mano senza penalità. Le armi a due
    mani infliggono +1d4 danni (+1d6 se hai 50% o meno dei PF, +1d8 se hai 25% o
    meno dei PF)."
  can_be_removed: 0

- key: ""
  name: "Anima della Torre"
  weight: 0
  description: "Anima corrotta dall'Abisso, intrisa di potere. La povera creatura
    attese per tutta la vita il giorno in cui avrebbe realizzato il tanto
    agognato sogno. Spezzata e tormentata dal desiderio, finì per esserne
    consumata. Sei sempre il primo nel turno di iniziativa. Una volta per turno
    puoi eseguire una qualsiasi azione come azione gratuita."
  can_be_removed: 0

- key: ""
  name: "Anima della Regina"
  weight: 0
  description: "Anima corrotta dall'Abisso, intrisa di potere."
  can_be_removed: 0
